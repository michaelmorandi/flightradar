server {
    listen 80;
    server_name localhost;

    # API reverse proxy → uvicorn on port 8083
    location /api/ {
        proxy_pass http://127.0.0.1:8083;

        # Set X-Real-IP to the IP that connected to Nginx ($remote_addr).
        # The rate limiter reads this header; it is written by Nginx from its
        # own socket state so a remote client cannot spoof it.
        proxy_set_header X-Real-IP $remote_addr;

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: disable buffering so events are flushed immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Frontend - serve static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
